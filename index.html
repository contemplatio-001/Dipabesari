<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Nasab Keluarga</title>
    <style>
        /* TEMA DOMINAN BIRU */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e6f2ff;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* HALAMAN LOGIN */
        #login-page {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0056b3, #00aaff);
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 300px;
        }
        .login-box h2 {
            color: #0056b3;
            margin-top: 0;
        }
        .login-box input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 10px;
            border: 2px solid #b3d9ff;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
        }
        .login-box button {
            background: #0056b3;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        .login-box button:hover { background: #004494; }
        #login-error { color: red; font-size: 12px; display: none; margin-bottom: 10px; }

        /* HALAMAN UTAMA APLIKASI */
        #app-page {
            display: none;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: #0056b3;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 20px; }
        .header button {
            background: #ff4d4d; color: white; border: none;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        /* AREA POHON (Mendukung Scroll) */
        .tree-container {
            flex: 1; overflow: auto; padding: 40px;
            display: flex; justify-content: center; align-items: flex-start;
        }

        /* CSS POHON HIERARKI */
        .tree ul {
            padding-top: 20px; position: relative;
            transition: all 0.5s; display: flex; justify-content: center;
        }
        .tree li {
            float: left; text-align: center;
            list-style-type: none; position: relative;
            padding: 20px 10px 0 10px; transition: all 0.5s;
        }
        
        /* Garis Penghubung */
        .tree li::before, .tree li::after {
            content: ''; position: absolute; top: 0; right: 50%;
            border-top: 2px solid #0056b3; width: 50%; height: 20px;
        }
        .tree li::after {
            right: auto; left: 50%; border-left: 2px solid #0056b3;
        }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #0056b3; border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul ul::before {
            content: ''; position: absolute; top: 0; left: 50%;
            border-left: 2px solid #0056b3; width: 0; height: 20px;
        }

        /* UNIT KELUARGA (Suami & Istri Berdampingan) */
        .family-unit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px; /* Jarak antar kotak suami istri */
            position: relative;
            z-index: 1;
        }

        /* KOTAK INDIVIDU */
        .node-box {
            border: 2px solid #0056b3;
            padding: 15px 10px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* Pewarnaan Khusus Pasangan */
        .spouse-istri { border-color: #d81b60; }
        .spouse-istri .person { color: #d81b60; }
        .spouse-suami { border-color: #007bff; }
        .spouse-suami .person { color: #007bff; }
        
        .person {
            font-weight: bold; font-size: 16px;
            color: #004494; margin-bottom: 5px;
        }
        .label-role {
            font-size: 11px;
            background: #eee;
            padding: 2px 5px;
            border-radius: 3px;
            margin-bottom: 8px;
            display: inline-block;
        }
        .spouse-connector {
            font-size: 20px;
            color: #0056b3;
            background: white;
            padding: 5px;
            border-radius: 50%;
            z-index: 2;
        }

        /* TOMBOL AKSI */
        .actions {
            display: flex; flex-wrap: wrap; gap: 4px;
            justify-content: center; border-top: 1px dashed #ccc;
            padding-top: 8px; margin-top: auto;
        }
        .actions button {
            font-size: 10px; cursor: pointer;
            background: #e6f2ff; border: 1px solid #0056b3;
            color: #0056b3; border-radius: 4px; padding: 4px;
            font-weight: bold; flex: 1; min-width: 45%;
        }
        .actions button:hover { background: #0056b3; color: white; }
        .actions .btn-del { border-color: #ff4d4d; color: #ff4d4d; background: #ffe6e6; }
        .actions .btn-del:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h2>Masuk Nasab</h2>
            <div id="login-error">Username atau Password salah!</div>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Masuk</button>
        </div>
    </div>

    <div id="app-page">
        <div class="header">
            <h1>Pohon Nasab Keluarga</h1>
            <button onclick="logout()">Keluar</button>
        </div>
        <div class="tree-container">
            <div class="tree" id="tree-root">
                </div>
        </div>
    </div>

    <script>
        // 1. DATA DAN PENYIMPANAN LOKAL
        const defaultData = {
            id: 1,
            name: "Leluhur Utama",
            spouses: [], 
            children: []
        };

        let nasabData = JSON.parse(localStorage.getItem('nasabData')) || defaultData;

        function saveData() {
            localStorage.setItem('nasabData', JSON.stringify(nasabData));
            renderTree(); 
        }

        // 2. SISTEM LOGIN
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === "Bismillah" && pass === "Bismillah") {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-page').style.display = 'flex';
                renderTree();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('app-page').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // 3. FUNGSI UTILITAS PENCARIAN
        function findNode(node, id) {
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    let result = findNode(child, id);
                    if (result) return result;
                }
            }
            return null;
        }

        function findParent(node, id, parent = null) {
            if (node.id === id) return parent;
            if (node.children) {
                for (let child of node.children) {
                    let result = findParent(child, id, node);
                    if (result !== undefined) return result;
                }
            }
            return undefined;
        }

        // 4. FUNGSI CRUD
        // --- Untuk Orang Utama ---
        function editName(id) {
            let node = findNode(nasabData, id);
            let newName = prompt("Masukkan nama baru:", node.name);
            if (newName && newName.trim() !== "") {
                node.name = newName;
                saveData();
            }
        }

        function addChild(id) {
            let node = findNode(nasabData, id);
            let childName = prompt("Masukkan nama anak:");
            if (childName && childName.trim() !== "") {
                if (!node.children) node.children = [];
                node.children.push({
                    id: Date.now(), 
                    name: childName,
                    spouses: [],
                    children: []
                });
                saveData();
            }
        }

        function deleteNode(id) {
            if (id === 1) {
                alert("Leluhur utama tidak bisa dihapus!");
                return;
            }
            if (confirm("Hapus data ini beserta seluruh keturunannya?")) {
                let parent = findParent(nasabData, id);
                if (parent) {
                    parent.children = parent.children.filter(child => child.id !== id);
                    saveData();
                }
            }
        }

        // --- Untuk Pasangan (Suami/Istri) ---
        function addSpouse(id, type) {
            let node = findNode(nasabData, id);
            let name = prompt(`Masukkan nama ${type}:`);
            if (name && name.trim() !== "") {
                if (!node.spouses) node.spouses = [];
                node.spouses.push({ name: name, type: type });
                saveData();
            }
        }

        function editSpouse(nodeId, spouseIndex) {
            let node = findNode(nasabData, nodeId);
            let spouse = node.spouses[spouseIndex];
            let newName = prompt(`Edit nama ${spouse.type}:`, spouse.name);
            if (newName && newName.trim() !== "") {
                node.spouses[spouseIndex].name = newName;
                saveData();
            }
        }

        function hapusSpouse(nodeId, spouseIndex) {
            if(confirm("Hapus pasangan ini?")) {
                let node = findNode(nasabData, nodeId);
                node.spouses.splice(spouseIndex, 1);
                saveData();
            }
        }

        // 5. RENDER TAMPILAN POHON
        function renderTree() {
            const container = document.getElementById('tree-root');
            container.innerHTML = `<ul>${generateHTML(nasabData)}</ul>`;
        }

        function generateHTML(node) {
            let html = `<li>`;
            
            // Bungkus utama untuk Suami & Istri agar berdampingan
            html += `<div class="family-unit">`;

            // 1. Kotak Orang Utama (Garis Darah / Keturunan Asli)
            html += `<div class="node-box">
                        <div class="person">${node.name}</div>
                        <div class="label-role">Nasab Utama</div>
                        <div class="actions">
                            <button onclick="editName(${node.id})">Edit</button>
                            <button class="btn-del" onclick="deleteNode(${node.id})">Hapus</button>
                            <button onclick="addChild(${node.id})">+ Anak</button>
                            <button onclick="addSpouse(${node.id}, 'Istri')">+ Istri</button>
                            <button onclick="addSpouse(${node.id}, 'Suami')">+ Suami</button>
                        </div>
                     </div>`;
            
            // 2. Kotak Pasangan (Istri / Suami) di sebelahnya
            if (node.spouses && node.spouses.length > 0) {
                node.spouses.forEach((spouse, index) => {
                    let spouseClass = spouse.type.toLowerCase() === 'suami' ? 'spouse-suami' : 'spouse-istri';
                    
                    // Ikon penghubung antar pasangan
                    html += `<div class="spouse-connector">🫶</div>`; 
                    
                    // Kotak Pasangan
                    html += `<div class="node-box ${spouseClass}">
                                <div class="person">${spouse.name}</div>
                                <div class="label-role">${spouse.type}</div>
                                <div class="actions">
                                    <button onclick="editSpouse(${node.id}, ${index})">Edit</button>
                                    <button class="btn-del" onclick="hapusSpouse(${node.id}, ${index})">Hapus</button>
                                </div>
                             </div>`;
                });
            }

            html += `</div>`; // Tutup family-unit

            // 3. Render Anak-anak di bawahnya (Rekursif)
            if (node.children && node.children.length > 0) {
                html += `<ul>`;
                for (let child of node.children) {
                    html += generateHTML(child);
                }
                html += `</ul>`;
            }

            html += `</li>`;
            return html;
        }

        // Render awal aplikasi
        renderTree();
    </script>
</body>
</html>
