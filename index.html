<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Tree Blue UI</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #bbdefb);
}

/* HEADER */
header {
    background: linear-gradient(90deg, #1565c0, #42a5f5);
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* CONTAINER */
#tree-container {
    width: 100%;
    height: 85vh;
    overflow: auto;
}

/* SVG */
svg {
    min-width: 1800px;
}

/* GARIS */
line {
    stroke: #64b5f6;
    stroke-width: 2;
}

/* NODE */
.node rect {
    fill: white;
    stroke: #2196f3;
    stroke-width: 2;
    rx: 15;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
}

.node text {
    font-size: 14px;
    font-weight: bold;
    fill: #0d47a1;
}

/* MENU */
.menu {
    position: absolute;
    background: white;
    border-radius: 12px;
    padding: 10px;
    display: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    z-index: 999;
}

.menu button {
    display: block;
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    border: none;
    background: linear-gradient(90deg, #1565c0, #42a5f5);
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.menu button:hover {
    background: linear-gradient(90deg, #0d47a1, #1976d2);
}
</style>
</head>

<body>

<header>
    🌳 Family Tree Profesional
</header>

<div id="tree-container">
    <div id="tree"></div>
</div>

<div id="menu" class="menu">
    <button onclick="editNode()">✏️ Edit</button>
    <button onclick="addHusband()">👨 Tambah Suami</button>
    <button onclick="addWife()">👩 Tambah Istri</button>
    <button onclick="addChild()">👶 Tambah Anak</button>
    <button onclick="deleteNode()">❌ Hapus</button>
    <button onclick="saveData()">💾 Simpan</button>
</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("tree")) || {
    name: "Ki. Adam",
    gender: "M",
    spouses: [
        { name: "Ny. Agami", gender: "F", children: [] }
    ]
};

let selected = null;

// BUILD
function buildNodes(person, depth = 0, x = 900, nodes = [], links = []) {

    const spaceX = 260;
    const spaceY = 150;

    nodes.push({ name: person.name, x, y: depth * spaceY, ref: person });

    if(person.spouses){
        person.spouses.forEach((spouse, i) => {

            const sx = person.gender === "M"
                ? x + (i + 1) * spaceX
                : x - (i + 1) * spaceX;

            nodes.push({ name: spouse.name, x: sx, y: depth * spaceY, ref: spouse });

            links.push({ x1: x, y1: depth * spaceY, x2: sx, y2: depth * spaceY });

            spouse.children.forEach((child, idx) => {

                const cx = sx - 80 + idx * 160;

                nodes.push({ name: child.name, x: cx, y: (depth + 1) * spaceY, ref: child });

                links.push({ x1: sx, y1: depth * spaceY, x2: cx, y2: (depth + 1) * spaceY });

                buildNodes(child, depth + 2, cx, nodes, links);
            });
        });
    }

    return {nodes, links};
}

// DRAW
function draw(){

    document.getElementById("tree").innerHTML = "";

    const svg = d3.select("#tree")
        .append("svg")
        .attr("width", 2000)
        .attr("height", 1200);

    const graph = buildNodes(data);

    svg.selectAll("line")
        .data(graph.links)
        .enter()
        .append("line")
        .attr("x1", d=>d.x1)
        .attr("y1", d=>d.y1)
        .attr("x2", d=>d.x2)
        .attr("y2", d=>d.y2);

    const node = svg.selectAll("g")
        .data(graph.nodes)
        .enter()
        .append("g")
        .attr("transform", d=>`translate(${d.x},${d.y})`);

    node.append("rect")
        .attr("width",160)
        .attr("height",60)
        .attr("x",-80)
        .attr("y",-30);

    node.append("text")
        .attr("text-anchor","middle")
        .attr("dy",5)
        .text(d=>d.name);

    node.on("click",(event,d)=>{
        selected = d.ref;

        const menu = document.getElementById("menu");
        menu.style.left = event.pageX+"px";
        menu.style.top = event.pageY+"px";
        menu.style.display="block";

        event.stopPropagation();
    });

    document.body.onclick=()=>{
        document.getElementById("menu").style.display="none";
    }
}

// MENU ACTION
function editNode(){
    const n = prompt("Nama:");
    if(n){ selected.name=n; draw(); }
}

function addHusband(){
    if(!selected.spouses) selected.spouses = [];
    const n = prompt("Nama suami:");
    if(!n) return;

    selected.spouses.push({name:n, gender:"M", children:[]});
    draw();
}

function addWife(){
    if(!selected.spouses) selected.spouses = [];
    const n = prompt("Nama istri:");
    if(!n) return;

    selected.spouses.push({name:n, gender:"F", children:[]});
    draw();
}

function addChild(){
    if(!selected.children){
        alert("Tambah anak melalui pasangan!");
        return;
    }

    const n = prompt("Nama anak:");
    if(!n) return;

    selected.children.push({name:n, gender:"M", spouses:[]});
    draw();
}

function deleteNode(){
    alert("Hapus akan disempurnakan di versi berikutnya");
}

function saveData(){
    localStorage.setItem("tree", JSON.stringify(data));
    alert("Data tersimpan!");
}

// INIT
draw();

</script>

</body>
</html>
