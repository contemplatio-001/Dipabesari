<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga Pro - Responsive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --line-color: #3b82f6; }
        .tree-wrapper { display: flex; justify-content: center; padding: 40px; min-width: max-content; }
        .node-group { display: flex; flex-direction: column; align-items: center; position: relative; }
        
        /* Baris Pasangan */
        .couple-row { display: flex; align-items: flex-start; position: relative; margin-bottom: 30px; gap: 20px; }
        
        /* Garis penghubung suami-istri */
        .couple-row::after {
            content: ""; position: absolute; top: 40px; left: 50px; right: 50px;
            height: 2px; background: var(--line-color); z-index: 0;
        }

        /* Garis vertikal dari tengah pasangan ke anak */
        .stem-line {
            width: 2px; height: 30px; background: var(--line-color);
            position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
        }

        /* Kontainer Anak */
        .children-row {
            display: flex; justify-content: center; position: relative;
            padding-top: 30px; border-top: 2px solid var(--line-color); margin-top: 30px;
        }

        .member-card {
            width: 160px; background: white; border: 2px solid var(--line-color);
            border-radius: 12px; padding: 12px; z-index: 10; transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .member-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); }
        
        .gender-laki { border-color: #2563eb; background: #eff6ff; }
        .gender-perempuan { border-color: #db2777; background: #fdf2f8; }

        /* Dropdown Menu */
        .menu-btn { cursor: pointer; color: #64748b; }
        .menu-content { display: none; position: absolute; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-radius: 8px; width: 140px; z-index: 50; border: 1px solid #e2e8f0; }
        .menu-content button { width: 100%; text-align: left; padding: 8px 12px; font-size: 12px; }
        .menu-content button:hover { background: #f1f5f9; color: #2563eb; }
        .show { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-blue-800 text-white p-4 sticky top-0 z-[100] flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🌳</span>
            <h1 class="font-bold tracking-tight">NASAB-APP <span class="text-blue-300 font-light text-xs ml-2">v3.0</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="downloadJSON()" class="bg-blue-700 hover:bg-blue-600 px-3 py-1.5 rounded-md text-xs">Backup JSON</button>
            <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-500 px-3 py-1.5 rounded-md text-xs">Excel</button>
            <button onclick="window.print()" class="bg-white text-blue-800 px-3 py-1.5 rounded-md text-xs font-bold">Cetak PDF</button>
        </div>
    </nav>

    <main class="overflow-auto h-[calc(100vh-64px)]">
        <div id="tree-container" class="tree-wrapper"></div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center z-[200] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">Tambah Anggota</h3>
            <div class="space-y-4">
                <input type="text" id="m-name" placeholder="Nama Lengkap" class="w-full border-slate-200 border-2 p-2.5 rounded-xl focus:border-blue-500 outline-none transition">
                <select id="m-gender" class="w-full border-slate-200 border-2 p-2.5 rounded-xl outline-none">
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>
            <div class="flex justify-end mt-6 gap-3">
                <button onclick="closeModal()" class="text-slate-400 font-medium px-4 hover:text-slate-600">Batal</button>
                <button onclick="processAction()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('nasab_v3')) || {
            id: "root", name: "Kepala Keluarga", gender: "Laki-laki", partners: [], children: []
        };

        let currentAction = { type: '', targetId: '' };

        function render() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            container.appendChild(buildNode(db));
        }

        function buildNode(person) {
            const group = document.createElement('div');
            group.className = "node-group";

            // Pasangan Row
            const row = document.createElement('div');
            row.className = "couple-row";

            // Card Utama
            row.appendChild(createCard(person, false));

            // Garis Tengah & Card Pasangan
            if (person.partners && person.partners.length > 0) {
                person.partners.forEach(p => row.appendChild(createCard(p, true, person.id)));
                
                // Jika ada anak, buat garis batang di tengah
                if (person.children.length > 0) {
                    const stem = document.createElement('div');
                    stem.className = "stem-line";
                    row.appendChild(stem);
                }
            } else if (person.children.length > 0) {
                // Jika tidak ada pasangan tapi ada anak, tetap tarik garis dari bawah card utama
                const stem = document.createElement('div');
                stem.className = "stem-line";
                stem.style.left = "80px"; // posisi tengah card pertama
                row.appendChild(stem);
            }

            group.appendChild(row);

            // Baris Anak (Urutan: Tua ke Muda / Kiri ke Kanan)
            if (person.children.length > 0) {
                const childRow = document.createElement('div');
                childRow.className = "children-row";
                person.children.forEach(child => {
                    childRow.appendChild(buildNode(child));
                });
                group.appendChild(childRow);
            }

            return group;
        }

        function createCard(p, isPartner, parentIdIfPartner) {
            const div = document.createElement('div');
            div.className = `member-card ${p.gender === 'Laki-laki' ? 'gender-laki' : 'gender-perempuan'} relative`;
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">${isPartner ? 'Pasangan' : 'Anggota'}</span>
                    <div class="relative">
                        <button onclick="toggleMenu(event)" class="menu-btn font-bold px-1">⋮</button>
                        <div class="menu-content shadow-xl border">
                            <button onclick="initAction('edit', '${p.id}', '${isPartner ? parentIdIfPartner : ''}')">✏️ Edit</button>
                            ${!isPartner ? `
                                <button onclick="initAction('child', '${p.id}')">👶 Tambah Anak</button>
                                <button onclick="initAction('wife', '${p.id}')">👩 Tambah Istri</button>
                                <button onclick="initAction('husband', '${p.id}')">👨 Tambah Suami</button>
                            ` : ''}
                            <button class="text-red-500" onclick="deleteMember('${p.id}', ${isPartner}, '${parentIdIfPartner}')">🗑️ Hapus</button>
                        </div>
                    </div>
                </div>
                <div class="font-bold text-slate-800 truncate mt-1" title="${p.name}">${p.name}</div>
                <div class="text-[10px] text-slate-500 italic mt-1">${p.gender}</div>
            `;
            return div;
        }

        // Action Logic
        function initAction(type, id, partnerOfId = '') {
            currentAction = { type, targetId: id, partnerOfId };
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            
            if (type === 'edit') {
                const data = findNode(db, id, partnerOfId);
                document.getElementById('m-name').value = data.name;
                document.getElementById('m-gender').value = data.gender;
                title.innerText = "Edit Data";
            } else {
                document.getElementById('m-name').value = '';
                title.innerText = type.includes('child') ? "Tambah Anak" : "Tambah Pasangan";
            }
            modal.classList.remove('hidden');
        }

        function processAction() {
            const name = document.getElementById('m-name').value;
            const gender = document.getElementById('m-gender').value;
            if (!name) return;

            const { type, targetId, partnerOfId } = currentAction;
            
            if (type === 'edit') {
                const node = findNode(db, targetId, partnerOfId);
                node.name = name;
                node.gender = gender;
            } else if (type === 'child') {
                const node = findNode(db, targetId);
                node.children.push({ id: "id_"+Date.now(), name, gender, partners: [], children: [] });
            } else {
                const node = findNode(db, targetId);
                node.partners.push({ id: "id_"+Date.now(), name, gender });
            }

            save();
            closeModal();
        }

        function deleteMember(id, isPartner, parentId) {
            if (!confirm("Hapus orang ini dan seluruh keturunannya?")) return;
            if (id === 'root') return alert("Akar silsilah tidak bisa dihapus!");

            if (isPartner) {
                const parent = findNode(db, parentId);
                parent.partners = parent.partners.filter(p => p.id !== id);
            } else {
                removeFromTree(db, id);
            }
            save();
        }

        function removeFromTree(parent, id) {
            parent.children = parent.children.filter(c => c.id !== id);
            parent.children.forEach(c => removeFromTree(c, id));
        }

        function findNode(node, id, partnerOfId = '') {
            if (!partnerOfId) {
                if (node.id === id) return node;
                for (let c of node.children) {
                    let res = findNode(c, id);
                    if (res) return res;
                }
            } else {
                const parent = findNode(db, partnerOfId);
                return parent.partners.find(p => p.id === id);
            }
            return null;
        }

        // Global Helpers
        function save() { localStorage.setItem('nasab_v3', JSON.stringify(db)); render(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function toggleMenu(e) {
            document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));
            e.target.nextElementSibling.classList.add('show');
            e.stopPropagation();
        }
        window.onclick = () => document.querySelectorAll('.menu-content').forEach(m => m.classList.remove('show'));

        function exportToExcel() {
            let list = [];
            const flat = (n, p = "-") => {
                list.push({ Nama: n.name, Gender: n.gender, OrangTua: p, Status: "Anggota" });
                n.partners.forEach(pt => list.push({ Nama: pt.name, Gender: pt.gender, OrangTua: n.name, Status: "Pasangan" }));
                n.children.forEach(c => flat(c, n.name));
            }
            flat(db);
            const ws = XLSX.utils.json_to_sheet(list);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data Nasab");
            XLSX.writeFile(wb, "Silsilah_Keluarga.xlsx");
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "backup_nasab.json");
            dlAnchorElem.click();
        }

        render();
    </script>
</body>
</html>
