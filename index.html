<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silsilah Keluarga - Blue Graphic Edition</title>
    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --primary: #1e3a8a; --secondary: #3b82f6; --accent: #60a5fa; 
            --bg: #f8fafc; --line-color: #3b82f6; --danger: #ef4444; --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: #1e293b; overflow: hidden; }

        /* Cloud Status */
        #cloud-status {
            position: fixed; bottom: 20px; right: 20px; padding: 10px 18px;
            background: var(--primary); color: white; border-radius: 30px;
            font-size: 0.75rem; font-weight: 600; z-index: 10000; display: none;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
        }

        /* Login */
        #login-screen { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: #fff; padding: 35px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; }
        .login-box button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        #app-screen { display: none; width: 100vw; height: 100vh; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; z-index: 2000; transition: 0.3s; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .user-badge { background: var(--accent); color: var(--primary); font-size: 0.65rem; padding: 3px 10px; border-radius: 20px; font-weight: 800; }
        .sidebar-menu { list-style: none; padding: 15px 0; flex-grow: 1; }
        .sidebar-menu li { padding: 12px 25px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; opacity: 0.8; transition: 0.2s; }
        .sidebar-menu li:hover, .sidebar-menu li.active { opacity: 1; background: rgba(255,255,255,0.1); border-left: 5px solid var(--accent); }
        .sidebar-menu li.logout { color: #fca5a5; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }

        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); z-index: 1500; }

        /* Main Content */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { background: #fff; padding: 12px 20px; display: flex; gap: 10px; align-items: center; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        .btn-hamburger { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        .btn-tool { padding: 8px 15px; border: none; border-radius: 8px; font-size: 0.8rem; cursor: pointer; color: white; font-weight: bold; }

        /* TREE ENGINE - STRUKTUR GRAFIS GARIS PANJANG */
        .tree-area { flex-grow: 1; overflow: hidden; background: var(--bg); cursor: grab; }
        .tree { display: inline-flex; padding: 100px; transform-origin: top center; }
        .tree ul { padding-top: 60px; position: relative; display: flex; justify-content: center; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 60px 15px 0 15px; }
        
        /* Garis Vertikal Atas */
        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid var(--line-color); width: 50%; height: 60px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--line-color); }
        
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid var(--line-color); border-radius: 0 10px 0 0; }
        .tree li:first-child::after { border-radius: 10px 0 0 0; }
        
        /* Garis Vertikal Turun dari Orang Tua */
        .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid var(--line-color); height: 60px; }

        /* KOTAK PERSON (RINGKAS & MENARIK) */
        .node-card { 
            background: #fff; border: 1.5px solid #cbd5e1; padding: 10px; 
            border-radius: 12px; width: 140px; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s;
            border-top: 5px solid var(--primary);
        }
        .node-card:hover { transform: translateY(-5px); border-color: var(--secondary); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.15); }

        /* Menu Garis Tiga (Setiap Person) */
        .menu-trigger {
            position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            gap: 3px; cursor: pointer; border-radius: 4px; z-index: 10;
        }
        .menu-trigger:hover { background: #f1f5f9; }
        .menu-trigger span { width: 12px; height: 2px; background: #94a3b8; border-radius: 1px; }

        .node-menu {
            display: none; position: absolute; top: 25px; right: 0;
            background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 1000; width: 150px; overflow: hidden; border: 1px solid #e2e8f0; text-align: left;
        }
        .node-menu div { padding: 10px; font-size: 0.75rem; cursor: pointer; color: #334155; display: flex; align-items: center; gap: 8px; }
        .node-menu div:hover { background: #eff6ff; color: var(--primary); }
        .node-menu .menu-del { border-top: 1px solid #f1f5f9; color: var(--danger); }

        .gen-label { font-size: 0.55rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .name { font-weight: 700; color: var(--primary); font-size: 0.85rem; margin-bottom: 6px; line-height: 1.2; }
        
        .partners-wrap { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
        .p-tag { font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
        .tag-s { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .tag-i { background: #fdf2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .p-del { cursor: pointer; font-size: 0.9rem; opacity: 0.4; }

        .bio-box { font-size: 0.6rem; color: #64748b; background: #f8fafc; padding: 5px; border-radius: 5px; border-left: 3px solid var(--accent); text-align: left; }

        #users-page { display: none; padding: 30px; background: white; height: 100%; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(3px); justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 2px solid #f1f5f9; border-radius: 8px; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100vh; }
            .sidebar.open { left: 0; }
            .btn-hamburger { display: block; }
        }
    </style>
</head>
<body onclick="closeAllMenus()">

    <div id="cloud-status">☁️ Menyimpan...</div>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--primary)">🌳 Silsilah Cloud</h2>
            <p style="font-size:0.8rem; color:#64748b; margin-bottom:20px;">Masuk untuk mengelola data keluarga</p>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="doLogin()">Masuk</button>
            <p id="login-status-text" style="margin-top:15px; font-size:0.7rem; color:#64748b;">⏳ Menghubungkan Cloud Server...</p>
        </div>
    </div>

    <!-- APP -->
    <div id="app-screen">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Silsilah Pro</h3>
                <span class="user-badge" id="display-role">...</span>
                <div style="font-size: 0.8rem; margin-top:10px; opacity:0.7;">User: <b id="display-user">...</b></div>
            </div>
            <ul class="sidebar-menu">
                <li class="active" onclick="switchPage('tree')">🌳 Pohon Keluarga</li>
                <li onclick="resetZoom()">🔍 Fokus Layar</li>
                <li id="menu-users" onclick="switchPage('users')">⚙️ Pengaturan & User</li>
                <li class="logout" onclick="doLogout()">🚪 Keluar</li>
            </ul>
        </div>

        <div class="main-content">
            <div id="tree-page" style="display: flex; flex-direction: column; height: 100%;">
                <div class="toolbar">
                    <button class="btn-hamburger" onclick="toggleSidebar()">☰</button>
                    <button class="btn-tool" style="background:var(--secondary)" onclick="exportPDF()">📄 Ekspor PDF</button>
                    <button class="btn-tool" style="background:var(--success)" onclick="exportExcel()">📊 Excel</button>
                    <button class="btn-tool" style="background:var(--primary)" onclick="fetchDataFromGitHub(true)">🔄 Segarkan Cloud</button>
                </div>
                <div class="tree-area" id="panzoom-wrapper">
                    <div class="tree" id="tree-container"></div>
                </div>
            </div>

            <!-- USERS PAGE -->
            <div id="users-page">
                <div style="background:var(--bg); padding:20px; border-radius:15px; border:1px solid var(--accent); margin-bottom:25px;">
                    <h4 style="color:var(--primary)">🔐 Akses Cloud GitHub</h4>
                    <input type="password" id="github-token-input" placeholder="ghp_xxxxxxxxxxxx" style="width:100%; margin:10px 0; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
                    <button class="btn-tool" style="background:var(--primary)" onclick="saveGitHubToken()">Simpan Token</button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>Manajemen User</h3>
                    <button class="btn-tool" style="background:var(--secondary)" onclick="openUserModal()">+ Tambah Akun</button>
                </div>
                <table>
                    <thead><tr><th>Username</th><th>Akses</th><th>Aksi</th></tr></thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL TREE -->
    <div class="modal" id="modal-tree" onclick="event.stopPropagation()">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom:15px; color:var(--primary);">Input Data</h3>
            <div class="form-group"><label>Nama Lengkap:</label><input type="text" id="input-name" autocomplete="off"></div>
            <div id="extra-info">
                <div class="form-group"><label>Biografi Singkat:</label><textarea id="input-desc" rows="3"></textarea></div>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button style="padding:10px 15px; border:none; background:#f1f5f9; border-radius:8px; cursor:pointer;" onclick="closeModal()">Batal</button>
                <button style="padding:10px 15px; border:none; background:var(--primary); color:white; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="saveTreeData()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL USER -->
    <div class="modal" id="modal-user" onclick="event.stopPropagation()">
        <div class="modal-content">
            <h3>Akun Pengguna</h3>
            <div class="form-group"><label>Username:</label><input type="text" id="input-username"></div>
            <div class="form-group"><label>Password:</label><input type="password" id="input-password"></div>
            <div class="form-group">
                <label>Level Akses:</label>
                <select id="input-role" style="width:100%; padding:10px; border-radius:8px; border:2px solid #f1f5f9;">
                    <option value="Admin">Admin (Pohon)</option>
                    <option value="Administrator">Administrator (Penuh)</option>
                </select>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:8px;">
                <button onclick="document.getElementById('modal-user').style.display='none'">Batal</button>
                <button style="background:var(--secondary); color:white; border:none; padding:10px 15px; border-radius:8px;" onclick="saveUserData()">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_OWNER = "contemplatio-001"; 
        const GITHUB_REPO = "Dipabesari"; 
        const GITHUB_FILE_PATH = "data.json";

        let usersDB = [{ username: 'superadmin', password: '123', role: 'Administrator' }];
        let familyTree = { id: 1, name: "Leluhur Utama", partners: [], children: [], description: "Puncak Silsilah" };
        
        let activeUser = null; 
        let githubFileSha = ""; 
        let myGithubToken = localStorage.getItem('myGithubToken') || "";

        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

        async function fetchDataFromGitHub(isManual = false) {
            const statusText = document.getElementById('login-status-text');
            try {
                let url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`;
                let response = await fetch(url + "?t=" + new Date().getTime(), {
                    headers: myGithubToken ? { 'Authorization': `token ${myGithubToken}` } : {}
                });
                if (response.ok) {
                    let data = await response.json();
                    githubFileSha = data.sha; 
                    let parsed = JSON.parse(b64_to_utf8(data.content));
                    if(parsed.tree) familyTree = parsed.tree;
                    if(parsed.users) usersDB = parsed.users;
                    if(isManual) alert("Data cloud berhasil ditarik!");
                    statusText.innerText = "✅ Cloud Connected";
                }
            } catch (e) { statusText.innerText = "⚠️ Offline Mode"; }
            if(activeUser) { renderTree(); renderUsersTable(); }
        }

        async function syncToGitHub() {
            if(!myGithubToken) return alert("Peringatan: Token belum diisi di Pengaturan!");
            const sUI = document.getElementById('cloud-status');
            sUI.style.display = 'block'; sUI.innerText = "☁️ Menyimpan...";

            try {
                let dataToSave = { tree: familyTree, users: usersDB };
                let response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${myGithubToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Update by ${activeUser.username}`,
                        content: utf8_to_b64(JSON.stringify(dataToSave, null, 2)),
                        sha: githubFileSha 
                    })
                });
                if (response.ok) {
                    let res = await response.json();
                    githubFileSha = res.content.sha;
                    sUI.innerText = "✅ Berhasil!";
                    setTimeout(() => sUI.style.display='none', 2000);
                }
            } catch (e) { alert("Sinkronisasi gagal."); }
        }

        function doLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            const found = usersDB.find(x => x.username === u && x.password === p);
            if(found) { activeUser = found; initDashboard(); } else { alert("User/Password salah!"); }
        }

        function initDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            document.getElementById('display-user').innerText = activeUser.username;
            document.getElementById('display-role').innerText = activeUser.role;
            if(activeUser.role !== 'Administrator') document.getElementById('menu-users').style.display = 'none';
            
            renderTree();
            const elem = document.getElementById('tree-container');
            panzoomInstance = Panzoom(elem, { maxScale: 4, minScale: 0.1 });
            document.getElementById('panzoom-wrapper').addEventListener('wheel', panzoomInstance.zoomWithWheel);
            if(activeUser.role === 'Administrator') {
                document.getElementById('github-token-input').value = myGithubToken;
                renderUsersTable();
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            let ov = document.getElementById('sidebar-overlay');
            ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
        }

        function switchPage(p) {
            document.getElementById('tree-page').style.display = p === 'tree' ? 'flex' : 'none';
            document.getElementById('users-page').style.display = p === 'users' ? 'block' : 'none';
            if(window.innerWidth < 768) toggleSidebar();
        }

        function resetZoom() { panzoomInstance.reset(); }
        function doLogout() { location.reload(); }
        function saveGitHubToken() {
            let t = document.getElementById('github-token-input').value.trim();
            if(t) { localStorage.setItem('myGithubToken', t); myGithubToken = t; alert("Token disimpan!"); fetchDataFromGitHub(); }
        }

        // TREE ENGINE - RENDERER
        function renderTree() {
            document.getElementById('tree-container').innerHTML = `<ul>${generateHTML(familyTree, 0)}</ul>`;
        }

        function generateHTML(node, level) {
            let pHTML = "";
            (node.partners || []).forEach((p, idx) => {
                pHTML += `<div class="p-tag ${p.type === 'Suami' ? 'tag-s' : 'tag-i'}">
                    <span>💍 ${p.name}</span>
                    <span class="p-del" onclick="deletePartner(${node.id}, ${idx})">×</span>
                </div>`;
            });

            return `<li>
                <div class="node-card">
                    <div class="menu-trigger" onclick="event.stopPropagation(); toggleNodeMenu(${node.id})">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="node-menu" id="menu-${node.id}">
                        <div onclick="openTreeModal('add-child', ${node.id})">➕ Tambah Anak</div>
                        <div onclick="openTreeModal('add-suami', ${node.id})">👨 Tambah Suami</div>
                        <div onclick="openTreeModal('add-istri', ${node.id})">👩 Tambah Istri</div>
                        <div onclick="openTreeModal('edit', ${node.id})">✏️ Edit Data</div>
                        ${(node.id !== 1 && activeUser.role === 'Administrator') ? `<div class="menu-del" onclick="deleteNode(${node.id})">🗑️ Hapus Orang</div>` : ''}
                    </div>
                    <div class="gen-label">${level === 0 ? 'Leluhur' : 'Generasi ' + level}</div>
                    <div class="name">${node.name}</div>
                    <div class="partners-wrap">${pHTML}</div>
                    ${node.description ? `<div class="bio-box">${node.description}</div>` : ''}
                </div>
                ${node.children && node.children.length > 0 ? `<ul>${node.children.map(c => generateHTML(c, level+1)).join('')}</ul>` : ''}
            </li>`;
        }

        function toggleNodeMenu(id) {
            const m = document.getElementById('menu-' + id);
            const isOpen = m.style.display === 'block';
            closeAllMenus();
            if(!isOpen) m.style.display = 'block';
        }

        function closeAllMenus() {
            document.querySelectorAll('.node-menu').forEach(m => m.style.display = 'none');
        }

        let currentAct = "", currentId = null;
        function openTreeModal(act, id) {
            currentAct = act; currentId = id;
            document.getElementById('input-name').value = "";
            document.getElementById('input-desc').value = "";
            document.getElementById('extra-info').style.display = act.includes('add-') && !act.includes('child') ? 'none' : 'block';
            document.getElementById('modal-tree').style.display = 'flex';
            if(act === 'edit') {
                let n = findNode(familyTree, id);
                document.getElementById('input-name').value = n.name;
                document.getElementById('input-desc').value = n.description || "";
            }
        }

        function closeModal() { document.getElementById('modal-tree').style.display = 'none'; }

        function saveTreeData() {
            let name = document.getElementById('input-name').value.trim();
            let desc = document.getElementById('input-desc').value.trim();
            if(!name) return alert("Nama wajib!");

            if(currentAct === 'add-child') {
                let p = findNode(familyTree, currentId);
                if(!p.children) p.children = [];
                p.children.push({ id: Date.now(), name: name, partners: [], description: desc, children: [] });
            } else if(currentAct === 'add-suami' || currentAct === 'add-istri') {
                let t = findNode(familyTree, currentId);
                if(!t.partners) t.partners = [];
                t.partners.push({ name: name, type: currentAct === 'add-suami' ? 'Suami' : 'Istri' });
            } else if(currentAct === 'edit') {
                let t = findNode(familyTree, currentId);
                t.name = name; t.description = desc;
            }
            closeModal(); renderTree(); syncToGitHub();
        }

        function deletePartner(nodeId, idx) {
            event.stopPropagation();
            if(confirm("Hapus pasangan ini?")) {
                let n = findNode(familyTree, nodeId);
                n.partners.splice(idx, 1);
                renderTree(); syncToGitHub();
            }
        }

        function deleteNode(id) {
            if(!confirm("Hapus orang ini dan keturunannya?")) return;
            const rm = (r) => {
                if(!r.children) return;
                let idx = r.children.findIndex(x => x.id === id);
                if(idx !== -1) { r.children.splice(idx, 1); return true; }
                for(let c of r.children) if(rm(c)) return true;
            };
            rm(familyTree); renderTree(); syncToGitHub();
        }

        function findNode(r, id) {
            if (r.id === id) return r;
            if (r.children) { for (let c of r.children) { let res = findNode(c, id); if (res) return res; } }
            return null;
        }

        // USER MGMT
        function renderUsersTable() {
            let b = document.getElementById('user-table-body'); b.innerHTML = "";
            usersDB.forEach(u => {
                b.innerHTML += `<tr>
                    <td><b>${u.username}</b></td>
                    <td>${u.role}</td>
                    <td><button onclick="deleteUser('${u.username}')" ${u.username==='superadmin'?'disabled':''}>Hapus</button></td>
                </tr>`;
            });
        }
        function openUserModal() { document.getElementById('modal-user').style.display = 'flex'; }
        function saveUserData() {
            let u = document.getElementById('input-username').value;
            let p = document.getElementById('input-password').value;
            let r = document.getElementById('input-role').value;
            if(!u || !p) return alert("Isi lengkap!");
            usersDB.push({ username: u, password: p, role: r });
            document.getElementById('modal-user').style.display = 'none';
            renderUsersTable(); syncToGitHub();
        }
        function deleteUser(u) { if(confirm("Hapus user?")) { usersDB = usersDB.filter(x => x.username !== u); renderUsersTable(); syncToGitHub(); } }

        // EXPORTS
        function exportPDF() {
            panzoomInstance.reset();
            setTimeout(() => {
                const el = document.getElementById('tree-container');
                html2pdf().set({ 
                    margin: 10, filename: 'Silsilah_Keluarga.pdf',
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'px', format: [el.scrollWidth + 100, el.scrollHeight + 100], orientation: 'l' }
                }).from(el).save();
            }, 500);
        }

        function exportExcel() {
            let csv = "ID,Generasi,Nama,Pasangan,Keterangan\n";
            const flat = (n, lv) => {
                let ps = (n.partners||[]).map(p => `${p.name}(${p.type})`).join("; ");
                csv += `${n.id},${lv},"${n.name}","${ps}","${n.description||''}"\n`;
                if(n.children) n.children.forEach(c => flat(c, lv+1));
            };
            flat(familyTree, 0);
            let link = document.createElement("a");
            link.href = "data:text/csv;charset=utf-8,\uFEFF" + encodeURI(csv);
            link.download = "data_silsilah.csv"; link.click();
        }

        window.onload = fetchDataFromGitHub;
    </script>
</body>
</html>
