<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Family Tree Pro Level 4</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #eef2f7;
}

#tree {
    width: 100%;
    height: 550px;
    background: white;
    border-radius: 10px;
}

.node rect {
    fill: white;
    stroke: black;
    stroke-width: 1.5px;
    rx: 10;
}

.node text {
    font-size: 12px;
}

img.avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
}

button {
    margin: 8px;
    padding: 10px 15px;
    border: none;
    background: black;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #333;
}
</style>
</head>

<body>

<h2>Family Tree Pro Level 4</h2>

<div id="tree"></div>

<div>
    <button onclick="addChild()">+ Anak</button>
    <button onclick="addSpouse()">+ Pasangan</button>
    <button onclick="downloadPDF()">PDF</button>
    <button onclick="downloadExcel()">Excel</button>
</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("tree")) || {
    name: "Ki. Adam",
    photo: "",
    spouse: {
        name: "Ny. Agami",
        photo: ""
    },
    children: []
};

// DRAW TREE
function drawTree() {

    localStorage.setItem("tree", JSON.stringify(data));

    document.getElementById("tree").innerHTML = "";

    const width = 900;
    const height = 500;

    const svg = d3.select("#tree")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const root = d3.hierarchy(convert(data));
    const treeLayout = d3.tree().size([width - 100, height - 100]);

    treeLayout(root);

    // garis
    svg.selectAll('line')
        .data(root.links())
        .enter()
        .append('line')
        .attr('x1', d => d.source.x + 50)
        .attr('y1', d => d.source.y + 50)
        .attr('x2', d => d.target.x + 50)
        .attr('y2', d => d.target.y + 50)
        .attr('stroke', 'black');

    // node
    const node = svg.selectAll('g')
        .data(root.descendants())
        .enter()
        .append('g')
        .attr('transform', d => `translate(${d.x + 50},${d.y + 50})`);

    node.append('rect')
        .attr('width', 90)
        .attr('height', 40)
        .attr('x', -45)
        .attr('y', -20);

    node.append('text')
        .attr('text-anchor', 'middle')
        .attr('dy', 5)
        .text(d => d.data.name)
        .on("click", function(event, d) {
            const newName = prompt("Edit nama:", d.data.name);
            if(newName){
                d.data.ref.name = newName;
                drawTree();
            }
        });

    node.append("image")
        .attr("xlink:href", d => d.data.photo || "https://via.placeholder.com/30")
        .attr("x", -15)
        .attr("y", -35)
        .attr("width", 30)
        .attr("height", 30)
        .on("click", function(event, d){
            const url = prompt("Masukkan URL foto:");
            if(url){
                d.data.ref.photo = url;
                drawTree();
            }
        });
}

// KONVERSI DATA (pasangan jadi node)
function convert(person) {

    let children = [];

    if (person.spouse) {
        children.push({
            name: person.spouse.name,
            photo: person.spouse.photo,
            ref: person.spouse
        });
    }

    if (person.children) {
        person.children.forEach(c => {
            children.push(convert(c));
        });
    }

    return {
        name: person.name,
        photo: person.photo,
        ref: person,
        children: children
    };
}

// TAMBAH ANAK
function addChild() {
    const name = prompt("Nama anak:");
    if (!name) return;

    data.children.push({
        name: name,
        photo: "",
        children: []
    });

    drawTree();
}

// TAMBAH PASANGAN
function addSpouse() {
    const name = prompt("Nama pasangan:");
    if (!name) return;

    data.spouse = {
        name: name,
        photo: ""
    };

    drawTree();
}

// PDF
async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById("tree"));
    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF('landscape');
    pdf.addImage(img, 'PNG', 10, 10, 260, 130);
    pdf.save("family-tree.pdf");
}

// EXCEL
function flatten(node, arr=[]) {
    arr.push([node.name]);
    if(node.spouse) arr.push([node.spouse.name]);
    if(node.children){
        node.children.forEach(c => flatten(c, arr));
    }
    return arr;
}

function downloadExcel() {
    const dataExcel = [["Nama"], ...flatten(data)];

    const ws = XLSX.utils.aoa_to_sheet(dataExcel);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Family");

    XLSX.writeFile(wb, "family-tree.xlsx");
}

// INIT
drawTree();

</script>

</body>
</html>
