<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasab Pro V17 - Connected Lines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue-main: #1e40af;
            --line-weight: 3px;
            --line-color: #000; /* Hitam tegas sesuai gambar */
        }
        body { background-color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .tree-container { padding: 100px; display: inline-block; min-width: 100%; text-align: center; }

        /* FAMILY UNIT */
        .family-node { display: inline-flex; flex-direction: column; align-items: center; vertical-align: top; }

        /* PARENTS SECTION */
        .parents-row { display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }

        /* CARD STYLE */
        .card { 
            width: 150px; padding: 12px; background: white; 
            border: var(--line-weight) solid var(--line-color); 
            position: relative; z-index: 20; text-align: center; font-weight: bold;
        }
        .card-partner { background: #e2e8f0; font-style: italic; }

        /* MARRIAGE LINE (Garis antara suami istri) */
        .marriage-bridge { 
            width: 40px; height: var(--line-weight); background: var(--line-color); 
            flex-shrink: 0; position: relative; margin: 0 -2px;
        }

        /* STEM DOWN (Garis vertikal dari tengah marriage ke bawah) */
        .stem-down {
            position: absolute; left: 50%; top: 0; width: var(--line-weight);
            height: 50px; background: var(--line-color); transform: translateX(-50%);
        }

        /* CHILDREN ROW WRAPPER */
        .children-row { 
            display: flex; justify-content: center; position: relative; 
            padding-top: 50px; margin-top: 0;
        }

        /* LINE SYSTEM FOR CHILDREN */
        .child-wrapper { position: relative; padding: 0 15px; }

        /* Garis Horizontal Penghubung (Penghubung Saudara) */
        .child-wrapper::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0;
            height: var(--line-weight); background: var(--line-color);
        }

        /* Potong garis di ujung agar membentuk siku */
        .child-wrapper:first-child::before { left: 50%; }
        .child-wrapper:last-child::before { right: 50%; }
        .child-wrapper:only-child::before { display: none; }

        /* Garis Vertikal Kecil ke Atas tiap kartu Anak */
        .line-up {
            position: absolute; top: 0; left: 50%;
            width: var(--line-weight); height: 25px; background: var(--line-color);
            transform: translateX(-50%);
        }

        /* UI TOOLKIT */
        .menu-dots { cursor: pointer; float: right; color: var(--blue-main); font-size: 18px; line-height: 1; }
        .dropdown { 
            display: none; position: absolute; right: 0; top: 30px; 
            background: white; border: 2px solid var(--line-color);
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1); z-index: 100; width: 170px;
        }
        .dropdown button { width: 100%; text-align: left; padding: 10px; font-size: 11px; border-bottom: 1px solid #eee; font-weight: bold; }
        .dropdown button:hover { background: var(--blue-main); color: white; }
        .show { display: block; }
    </style>
</head>
<body>

<nav class="bg-blue-900 text-white p-4 flex justify-between items-center sticky top-0 z-[1000] border-b-4 border-black">
    <h1 class="font-black italic tracking-tighter">NASAB V17 <span class="text-xs bg-white text-blue-900 px-2 rounded">PRO ARCHITECT</span></h1>
    <div class="flex gap-2">
        <button onclick="exportData()" class="bg-blue-700 px-3 py-1 rounded text-[10px] font-bold border border-white">SAVE</button>
        <button onclick="importData()" class="bg-white text-blue-900 px-3 py-1 rounded text-[10px] font-bold border border-black">OPEN</button>
        <button onclick="resetData()" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold">RESET</button>
    </div>
</nav>

<div class="tree-container" id="tree-root"></div>

<div id="modal" class="fixed inset-0 bg-blue-900/40 hidden flex items-center justify-center z-[2000] backdrop-blur-sm">
    <div class="bg-white p-6 border-4 border-black w-80 shadow-[10px_10px_0px_0px_rgba(0,0,0,1)]">
        <h3 class="font-black text-lg mb-4 border-b-4 border-black pb-2">INPUT DATA</h3>
        <div class="space-y-4">
            <input type="text" id="m-name" placeholder="Nama Lengkap" class="w-full border-2 border-black p-2 outline-none focus:bg-yellow-50">
            <input type="text" id="m-note" placeholder="Keterangan (Wafat/Alamat)" class="w-full border-2 border-black p-2 text-sm outline-none">
            <div id="rel-area" class="hidden">
                <label class="text-[10px] font-bold text-blue-700 uppercase">Hubungkan Ke Pasangan:</label>
                <select id="m-rel" class="w-full border-2 border-black p-2 text-xs font-bold"></select>
            </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
            <button onclick="closeModal()" class="font-bold text-xs uppercase">Batal</button>
            <button onclick="save()" class="bg-black text-white px-6 py-2 font-bold text-xs">SIMPAN</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('nasab_v17')) || {
        id: "root", name: "AYAH UTAMA", note: "", partners: [], children: []
    };

    let ctx = { type: '', id: '', pId: '' };

    function render() {
        const root = document.getElementById('tree-root');
        root.innerHTML = '';
        root.appendChild(createNode(db));
    }

    function createNode(person) {
        const container = document.createElement('div');
        container.className = "family-node";

        // 1. Baris Orang Tua
        const pRow = document.createElement('div');
        pRow.className = "parents-row";
        pRow.appendChild(makeCard(person, false));

        // Grouping Anak
        const kidsByParent = {};
        const direct = person.children.filter(c => !c.fromId || c.fromId === person.id);
        if(direct.length > 0) kidsByParent[person.id] = direct;

        person.partners.forEach((p, idx) => {
            const bridge = document.createElement('div');
            bridge.className = "marriage-bridge";
            
            const kids = person.children.filter(c => c.fromId === p.id);
            if(kids.length > 0) {
                kidsByParent[p.id] = kids;
                const stem = document.createElement('div');
                stem.className = "stem-down";
                bridge.appendChild(stem);
            }
            
            pRow.appendChild(bridge);
            pRow.appendChild(makeCard(p, true, person.id, idx + 1));
        });

        // Garis vertikal jika anak dari utama saja
        if(kidsByParent[person.id] && person.partners.length === 0) {
            const dStem = document.createElement('div');
            dStem.className = "w-[3px] h-[50px] bg-black absolute top-[40px]";
            pRow.appendChild(dStem);
        }

        container.appendChild(pRow);

        // 2. Baris Anak-Anak (Per Pasangan)
        Object.keys(kidsByParent).forEach(key => {
            const kids = kidsByParent[key];
            const cRow = document.createElement('div');
            cRow.className = "children-row";

            kids.forEach(child => {
                const wrapper = document.createElement('div');
                wrapper.className = "child-wrapper";
                
                const up = document.createElement('div');
                up.className = "line-up";
                wrapper.appendChild(up);

                wrapper.appendChild(createNode(child));
                cRow.appendChild(wrapper);
            });
            container.appendChild(cRow);
        });

        return container;
    }

    function makeCard(p, isP, refId, order) {
        const div = document.createElement('div');
        div.className = `card ${isP ? 'card-partner' : ''}`;
        div.innerHTML = `
            <span onclick="toggleMenu(event)" class="menu-dots">⋮</span>
            <div class="dropdown">
                <button onclick="openM('edit', '${p.id}', '${isP?refId:''}')">✏️ EDIT DATA</button>
                ${!isP ? `<button onclick="openM('child', '${p.id}')">👶 TAMBAH ANAK</button>
                          <button onclick="openM('partner', '${p.id}')">💍 TAMBAH PASANGAN</button>` : ''}
                <button class="text-red-600" onclick="del('${p.id}', ${isP}, '${refId}')">🗑️ HAPUS</button>
            </div>
            <div class="text-[12px] uppercase">${p.name}</div>
            <div class="text-[9px] text-gray-500 font-normal mt-1">${p.note || ''}</div>
        `;
        return div;
    }

    function toggleMenu(e) {
        e.stopPropagation();
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        e.target.nextElementSibling.classList.add('show');
    }

    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));

    function openM(type, id, pId = '') {
        ctx = { type, id, pId };
        document.getElementById('modal').classList.remove('hidden');
        const area = document.getElementById('rel-area');
        const sel = document.getElementById('m-rel');
        area.classList.add('hidden');

        if(type === 'child') {
            const n = find(db, id);
            if(n.partners.length > 0) {
                area.classList.remove('hidden');
                sel.innerHTML = `<option value="${n.id}">Utama (${n.name})</option>`;
                n.partners.forEach(p => sel.add(new Option(`Dgn Pasangan: ${p.name}`, p.id)));
            }
        }
        const curr = find(db, id, pId);
        document.getElementById('m-name').value = (type==='edit') ? curr.name : '';
        document.getElementById('m-note').value = (type==='edit') ? curr.note || '' : '';
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function save() {
        const name = document.getElementById('m-name').value;
        if(!name) return;
        const note = document.getElementById('m-note').value;
        const fid = document.getElementById('m-rel').value;

        if(ctx.type === 'edit') {
            const n = find(db, ctx.id, ctx.pId);
            n.name = name; n.note = note;
        } else if(ctx.type === 'child') {
            const p = find(db, ctx.id);
            p.children.push({ id: "id"+Date.now(), name, note, partners: [], children: [], fromId: fid || p.id });
        } else {
            const p = find(db, ctx.id);
            p.partners.push({ id: "id"+Date.now(), name, note });
        }
        localStorage.setItem('nasab_v17', JSON.stringify(db));
        render(); closeModal();
    }

    function find(root, id, pId = '') {
        if(!pId) {
            if(root.id === id) return root;
            for(let c of root.children) { let r = find(c, id); if(r) return r; }
        } else {
            return find(db, pId).partners.find(pt => pt.id === id);
        }
        return null;
    }

    function del(id, isP, pId) {
        if(id === 'root' || !confirm("Hapus?")) return;
        if(isP) {
            const p = find(db, pId);
            p.partners = p.partners.filter(pt => pt.id !== id);
        } else {
            removeRec(db, id);
        }
        localStorage.setItem('nasab_v17', JSON.stringify(db));
        render();
    }

    function removeRec(n, id) {
        n.children = n.children.filter(c => c.id !== id);
        n.children.forEach(c => removeRec(c, id));
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "nasab_pro.json"; a.click();
    }

    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader(); reader.readAsText(e.target.files[0]);
            reader.onload = () => { db = JSON.parse(reader.result); localStorage.setItem('nasab_v17', JSON.stringify(db)); render(); }
        };
        input.click();
    }

    function resetData() { if(confirm("Hapus semua?")) { localStorage.clear(); location.reload(); } }

    render();
</script>
</body>
</html>
