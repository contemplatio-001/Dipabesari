<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga - Struktur Garis Tengah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .family-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 15px;
        }
        .couple-container {
            display: flex;
            align-items: center;
            position: relative;
            padding-bottom: 20px;
        }
        /* Garis horizontal antara pasangan */
        .couple-container::after {
            content: "";
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #3b82f6;
            z-index: -1;
            transform: translateX(-50%);
        }
        /* Garis vertikal ke arah anak */
        .vertical-line {
            width: 2px;
            height: 20px;
            background: #3b82f6;
        }
        .children-container {
            display: flex;
            justify-content: center;
            border-top: 2px solid #3b82f6;
            padding-top: 20px;
            position: relative;
        }
        .member-card {
            min-width: 130px;
            padding: 10px;
            background: white;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            text-align: center;
            z-index: 10;
        }
        .partner-card {
            border-color: #ec4899;
            margin-left: 30px;
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen">

    <nav class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-lg font-bold">🌳 Aplikasi Silsilah Keluarga</h1>
        <div class="space-x-2">
            <button onclick="exportToPDF()" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded text-sm">PDF</button>
            <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-500 px-3 py-1 rounded text-sm">Excel</button>
            <button onclick="resetData()" class="bg-red-500 hover:bg-red-400 px-3 py-1 rounded text-sm">Reset</button>
        </div>
    </nav>

    <main class="p-10 overflow-auto">
        <div id="tree-root" class="flex justify-center"></div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
        <div class="bg-white p-6 rounded-lg w-80 shadow-xl">
            <h2 id="modal-title" class="font-bold text-blue-800 mb-4">Tambah Data</h2>
            <input type="hidden" id="target-id">
            <input type="hidden" id="action-type">
            <input type="text" id="member-name" placeholder="Nama Lengkap" class="w-full border p-2 mb-3 rounded">
            <select id="member-gender" class="w-full border p-2 mb-4 rounded">
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="text-gray-500 text-sm">Batal</button>
                <button onclick="saveMember()" class="bg-blue-700 text-white px-4 py-1 rounded">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        let familyData = JSON.parse(localStorage.getItem('nasabDataV2')) || {
            id: "root",
            name: "Kepala Keluarga",
            gender: "Laki-laki",
            partners: [],
            children: []
        };

        function renderTree() {
            const root = document.getElementById('tree-root');
            root.innerHTML = '';
            root.appendChild(drawNode(familyData));
        }

        function drawNode(person) {
            const group = document.createElement('div');
            group.className = "family-group";

            // Couple row
            const coupleDiv = document.createElement('div');
            coupleDiv.className = "couple-container";

            // Main Person
            const card = document.createElement('div');
            card.className = `member-card ${person.gender === 'Perempuan' ? 'border-pink-500' : 'border-blue-600'}`;
            card.innerHTML = `
                <div class="text-xs font-semibold uppercase text-gray-400">${person.gender}</div>
                <div class="font-bold text-blue-900">${person.name}</div>
                <div class="mt-2 flex flex-wrap gap-1 justify-center">
                    <button onclick="openModal('edit', '${person.id}')" class="text-[9px] bg-gray-100 px-1 rounded">Edit</button>
                    <button onclick="openModal('child', '${person.id}')" class="text-[9px] bg-blue-600 text-white px-1 rounded">+ Anak</button>
                    <button onclick="openModal('partner', '${person.id}')" class="text-[9px] bg-pink-500 text-white px-1 rounded">+ Pasangan</button>
                </div>
            `;
            coupleDiv.appendChild(card);

            // Partners
            person.partners.forEach(partner => {
                const pCard = document.createElement('div');
                pCard.className = "member-card partner-card";
                pCard.innerHTML = `<div class="text-xs text-pink-400 font-bold italic">Pasangan</div><div class="font-bold">${partner.name}</div>`;
                coupleDiv.appendChild(pCard);
            });

            group.appendChild(coupleDiv);

            // Children Logic
            if (person.children.length > 0) {
                const line = document.createElement('div');
                line.className = "vertical-line";
                group.appendChild(line);

                const childrenDiv = document.createElement('div');
                childrenDiv.className = "children-container";
                person.children.forEach(child => {
                    childrenDiv.appendChild(drawNode(child));
                });
                group.appendChild(childrenDiv);
            }

            return group;
        }

        function openModal(type, id) {
            document.getElementById('action-type').value = type;
            document.getElementById('target-id').value = id;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('member-name').value = '';
        }

        function findAndModify(node, id, action, data) {
            if (node.id === id) {
                if (action === 'child') node.children.push(data);
                if (action === 'partner') node.partners.push(data);
                if (action === 'edit') { node.name = data.name; node.gender = data.gender; }
                return true;
            }
            for (let child of node.children) {
                if (findAndModify(child, id, action, data)) return true;
            }
            return false;
        }

        function saveMember() {
            const name = document.getElementById('member-name').value;
            const gender = document.getElementById('member-gender').value;
            const type = document.getElementById('action-type').value;
            const id = document.getElementById('target-id').value;

            if (!name) return;

            const newData = { id: Date.now().toString(), name, gender, partners: [], children: [] };
            findAndModify(familyData, id, type, newData);
            
            localStorage.setItem('nasabDataV2', JSON.stringify(familyData));
            renderTree();
            closeModal();
        }

        function resetData() {
            if(confirm("Hapus semua?")) { localStorage.removeItem('nasabDataV2'); location.reload(); }
        }

        // Fitur Tambahan: Export (Sederhana)
        function exportToExcel() {
            let csv = "ID,Nama,Gender,Tipe\n";
            const flat = (n) => {
                csv += `${n.id},${n.name},${n.gender},Utama\n`;
                n.partners.forEach(p => csv += `-,${p.name},${p.gender},Pasangan\n`);
                n.children.forEach(flat);
            };
            flat(familyData);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'nasab.csv');
            a.click();
        }

        function exportToPDF() {
            window.print(); // Cara termudah untuk cetak PDF yang responsif dengan layout CSS
        }

        renderTree();
    </script>
</body>
</html>
