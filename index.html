<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Tree Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef2f7;
}

header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
}

#tree-container {
    width: 100%;
    height: 80vh;
    overflow: auto;
    background: #f9fafc;
}

#tree {
    min-width: 1400px;
    height: 100%;
}

.node rect {
    fill: white;
    stroke: black;
    rx: 10;
}

.node text {
    font-size: 13px;
    text-anchor: middle;
}

line {
    stroke: black;
}

/* MENU */
.menu {
    position: absolute;
    background: white;
    border-radius: 10px;
    padding: 10px;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.menu button {
    display: block;
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    border: none;
    background: black;
    color: white;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>
    <h2>Family Tree Profesional</h2>
</header>

<div id="tree-container">
    <div id="tree"></div>
</div>

<div id="menu" class="menu">
    <button onclick="editNode()">✏️ Edit</button>
    <button onclick="addSpouse()">👩 Tambah Pasangan</button>
    <button onclick="addChild()">👶 Tambah Anak</button>
    <button onclick="deleteNode()">❌ Hapus</button>
</div>

<script>

// DATA
let data = {
    name: "Ki. Adam",
    spouses: [
        { name: "Ny. Agami", children: [] }
    ]
};

let selected = null;

// BUILD TREE CUSTOM
function buildNodes(person, depth = 0, x = 700, nodes = [], links = []) {

    const spacingX = 220;
    const spacingY = 120;

    // suami (utama)
    nodes.push({ id: person, name: person.name, x: x, y: depth * spacingY, ref: person });

    person.spouses.forEach((spouse, i) => {

        const spouseX = x + (i + 1) * spacingX;

        // istri
        nodes.push({
            id: spouse,
            name: spouse.name,
            x: spouseX,
            y: depth * spacingY,
            ref: spouse,
            parent: person
        });

        // garis pasangan
        links.push({
            source: { x: x, y: depth * spacingY },
            target: { x: spouseX, y: depth * spacingY }
        });

        // anak
        spouse.children.forEach((child, index) => {
            const childX = spouseX - 80 + index * 160;

            nodes.push({
                id: child,
                name: child.name,
                x: childX,
                y: (depth + 1) * spacingY,
                ref: child,
                parent: spouse
            });

            // garis ke anak
            links.push({
                source: { x: spouseX, y: depth * spacingY },
                target: { x: childX, y: (depth + 1) * spacingY }
            });

            // rekursif
            buildNodes(child, depth + 2, childX, nodes, links);
        });

    });

    return { nodes, links };
}

// DRAW
function draw(){

    document.getElementById("tree").innerHTML = "";

    const width = 1600;
    const height = 900;

    const svg = d3.select("#tree")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const graph = buildNodes(data);

    // garis
    svg.selectAll("line")
        .data(graph.links)
        .enter()
        .append("line")
        .attr("x1", d=>d.source.x)
        .attr("y1", d=>d.source.y)
        .attr("x2", d=>d.target.x)
        .attr("y2", d=>d.target.y);

    // node
    const node = svg.selectAll("g")
        .data(graph.nodes)
        .enter()
        .append("g")
        .attr("transform", d=>`translate(${d.x},${d.y})`);

    node.append("rect")
        .attr("width",140)
        .attr("height",50)
        .attr("x",-70)
        .attr("y",-25);

    node.append("text")
        .text(d=>d.name)
        .attr("dy",5);

    node.on("click",(event,d)=>{
        selected = d.ref;

        const menu = document.getElementById("menu");
        menu.style.left = event.pageX+"px";
        menu.style.top = event.pageY+"px";
        menu.style.display="block";

        event.stopPropagation();
    });

    document.body.onclick=()=>{
        document.getElementById("menu").style.display="none";
    }
}

// MENU
function editNode(){
    const n = prompt("Nama:", selected.name);
    if(n){ selected.name=n; draw(); }
}

// TAMBAH PASANGAN
function addSpouse(){
    if(!selected.spouses) selected.spouses = [];
    const n = prompt("Nama pasangan:");
    if(!n) return;

    selected.spouses.push({name:n, children:[]});
    draw();
}

// TAMBAH ANAK
function addChild(){
    const n = prompt("Nama anak:");
    if(!n) return;

    if(selected.children){
        selected.children.push({name:n, spouses:[]});
    } else {
        alert("Tambah anak melalui pasangan!");
    }

    draw();
}

// HAPUS
function deleteNode(){
    alert("Fitur hapus kompleks (akan dibuat di upgrade berikutnya)");
}

// INIT
draw();

</script>

</body>
</html>
