<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Nasab - Simple & Clean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --line-color: #000; --line-w: 2px; }
        body { background-color: #ffffff; font-family: sans-serif; color: #333; margin: 0; }
        
        /* LOGIN PAGE */
        #login-page { position: fixed; inset: 0; background: #1e3a8a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 8px; width: 300px; text-align: center; }

        /* TREE STRUCTURE */
        #app { display: none; }
        .tree-wrapper { padding: 80px; text-align: center; white-space: nowrap; }

        .family-group { display: inline-flex; flex-direction: column; align-items: center; vertical-align: top; margin: 0 10px; }
        
        /* PARENTS */
        .parents { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 40px; }
        
        /* CARD STYLE */
        .card { 
            border: var(--line-w) solid var(--line-color); 
            padding: 10px; width: 140px; background: white; 
            font-size: 12px; font-weight: bold; position: relative; z-index: 10;
            text-align: center; word-wrap: break-word; white-space: normal;
        }
        .card-partner { background: #f0f4f8; border-style: dashed; }

        /* LINES */
        .marriage-line { width: 30px; height: var(--line-w); background: var(--line-color); flex-shrink: 0; position: relative; }
        
        /* Garis turun dari tengah pernikahan */
        .stem-down { 
            position: absolute; left: 50%; top: 0; width: var(--line-w); 
            height: 42px; background: var(--line-color); transform: translateX(-50%); 
        }

        /* CHILDREN CONTAINER */
        .children { display: flex; justify-content: center; position: relative; }

        /* Garis Horizontal Penghubung Saudara */
        .child-item { position: relative; padding-top: 40px; padding-left: 10px; padding-right: 10px; }
        .child-item::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0;
            height: var(--line-w); background: var(--line-color);
        }
        .child-item:first-child::before { left: 50%; }
        .child-item:last-child::before { right: 50%; }
        .child-item:only-child::before { display: none; }

        /* Garis Vertikal Siku ke Anak */
        .line-up {
            position: absolute; top: 0; left: 50%; width: var(--line-w);
            height: 40px; background: var(--line-color); transform: translateX(-50%);
        }

        /* UI */
        nav { background: #1e3a8a; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .btn { border: 1px solid #ccc; padding: 4px 10px; font-size: 11px; cursor: pointer; background: white; color: black; border-radius: 4px; }
        .btn-blue { background: #1e3a8a; color: white; border: none; }
        .dropdown { display: none; position: absolute; top: 100%; right: 0; background: white; border: 1px solid black; z-index: 50; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .dropdown button { display: block; width: 100%; padding: 8px 12px; text-align: left; font-size: 11px; border-bottom: 1px solid #eee; }
        .show { display: block; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-box">
        <h2 style="font-weight: bold; margin-bottom: 20px;">LOGIN ADMIN</h2>
        <input type="text" id="user" placeholder="Username" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc;">
        <input type="password" id="pass" placeholder="Password" style="width: 100%; padding: 8px; margin-bottom: 20px; border: 1px solid #ccc;">
        <button onclick="doLogin()" class="btn-blue" style="width: 100%; padding: 10px;">MASUK</button>
        <p id="err" style="color: red; font-size: 11px; margin-top: 10px; display: none;">Login Gagal!</p>
    </div>
</div>

<div id="app">
    <nav>
        <div style="font-weight: bold; font-size: 14px;">NASAB SIMPLE V20</div>
        <div style="display: flex; gap: 10px;">
            <button onclick="exportData()" class="btn">Simpan Data</button>
            <button onclick="importData()" class="btn">Buka Data</button>
            <button onclick="location.reload()" class="btn" style="background: #ef4444; color: white;">Keluar</button>
        </div>
    </nav>

    <div class="tree-wrapper" id="root"></div>
</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:4px; width:280px;">
        <h4 id="modal-title" style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid #000;">Input Data</h4>
        <input type="text" id="m-name" placeholder="Nama" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #000;">
        <input type="text" id="m-note" placeholder="Keterangan" style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #000;">
        <div id="rel-div" style="display:none; margin-bottom:15px;">
            <label style="font-size:10px; font-weight:bold;">Dari Pasangan:</label>
            <select id="m-rel" style="width:100%; padding:5px; border:1px solid #000;"></select>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="closeModal()" style="font-size:12px;">Batal</button>
            <button onclick="save()" class="btn-blue" style="padding:5px 15px; font-size:12px;">Simpan</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('nasab_simple')) || {
        id: "1", name: "Kepala Keluarga Utama", note: "", partners: [], children: []
    };
    let active = { type: '', id: '', pId: '' };

    function doLogin() {
        if(document.getElementById('user').value === 'Admin' && document.getElementById('pass').value === 'Admin') {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            render();
        } else { document.getElementById('err').style.display = 'block'; }
    }

    function render() {
        const root = document.getElementById('root');
        root.innerHTML = '';
        root.appendChild(build(db));
    }

    function build(person) {
        const group = document.createElement('div');
        group.className = "family-group";

        // Parents row
        const parents = document.createElement('div');
        parents.className = "parents";
        parents.appendChild(createCard(person, false));

        person.partners.forEach((p, i) => {
            const mLine = document.createElement('div');
            mLine.className = "marriage-line";
            
            // Jika pasangan ini punya anak, munculkan garis turun
            if(person.children.some(c => c.fromId === p.id)) {
                const stem = document.createElement('div');
                stem.className = "stem-down";
                mLine.appendChild(stem);
            }
            
            parents.appendChild(mLine);
            parents.appendChild(createCard(p, true, person.id));
        });

        // Garis tunggal jika tidak ada pasangan tapi punya anak
        if(person.partners.length === 0 && person.children.length > 0) {
            const soloStem = document.createElement('div');
            soloStem.className = "stem-down";
            soloStem.style.top = "36px";
            parents.appendChild(soloStem);
        }

        group.appendChild(parents);

        // Children row
        if(person.children.length > 0) {
            const kids = document.createElement('div');
            kids.className = "children";
            person.children.forEach(c => {
                const item = document.createElement('div');
                item.className = "child-item";
                const lineUp = document.createElement('div');
                lineUp.className = "line-up";
                item.appendChild(lineUp);
                item.appendChild(build(c));
                kids.appendChild(item);
            });
            group.appendChild(kids);
        }

        return group;
    }

    function createCard(p, isP, refId) {
        const div = document.createElement('div');
        div.className = `card ${isP ? 'card-partner' : ''}`;
        div.innerHTML = `
            <div style="position:absolute; top:2px; right:5px; cursor:pointer;" onclick="toggleMenu(event)">⋮</div>
            <div class="dropdown">
                <button onclick="openModal('edit', '${p.id}', '${isP?refId:''}')">Edit</button>
                ${!isP ? `<button onclick="openModal('child', '${p.id}')">Tambah Anak</button><button onclick="openModal('partner', '${p.id}')">Tambah Pasangan</button>` : ''}
                <button onclick="del('${p.id}', ${isP}, '${refId}')" style="color:red;">Hapus</button>
            </div>
            <div>${p.name}</div>
            <div style="font-size:9px; font-weight:normal; color:#666;">${p.note || ''}</div>
        `;
        return div;
    }

    function toggleMenu(e) {
        e.stopPropagation();
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        e.target.nextElementSibling.classList.add('show');
    }

    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));

    function openModal(type, id, pId) {
        active = { type, id, pId };
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('rel-div').style.display = 'none';
        
        const curr = find(db, id, pId);
        document.getElementById('m-name').value = (type==='edit') ? curr.name : '';
        document.getElementById('m-note').value = (type==='edit') ? curr.note : '';

        if(type === 'child') {
            const parent = find(db, id);
            if(parent.partners.length > 0) {
                document.getElementById('rel-div').style.display = 'block';
                const sel = document.getElementById('m-rel');
                sel.innerHTML = `<option value="${parent.id}">Utama</option>`;
                parent.partners.forEach(pt => sel.add(new Option(pt.name, pt.id)));
            }
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function save() {
        const name = document.getElementById('m-name').value;
        if(!name) return;
        const note = document.getElementById('m-note').value;
        const fid = document.getElementById('m-rel').value;

        if(active.type === 'edit') {
            const n = find(db, active.id, active.pId);
            n.name = name; n.note = note;
        } else if(active.type === 'child') {
            const p = find(db, active.id);
            p.children.push({ id: Date.now().toString(), name, note, partners: [], children: [], fromId: fid || p.id });
        } else if(active.type === 'partner') {
            const p = find(db, active.id);
            p.partners.push({ id: Date.now().toString(), name, note });
        }
        localStorage.setItem('nasab_simple', JSON.stringify(db));
        render(); closeModal();
    }

    function find(root, id, pId = '') {
        if(!pId) {
            if(root.id === id) return root;
            for(let c of root.children) { let r = find(c, id); if(r) return r; }
        } else {
            return find(db, pId).partners.find(pt => pt.id === id);
        }
        return null;
    }

    function del(id, isP, pId) {
        if(id === '1' || !confirm("Hapus?")) return;
        if(isP) {
            const p = find(db, pId);
            p.partners = p.partners.filter(pt => pt.id !== id);
        } else {
            removeRec(db, id);
        }
        localStorage.setItem('nasab_simple', JSON.stringify(db));
        render();
    }

    function removeRec(n, id) {
        n.children = n.children.filter(c => c.id !== id);
        n.children.forEach(c => removeRec(c, id));
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "nasab_data.json"; a.click();
    }

    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader(); reader.readAsText(e.target.files[0]);
            reader.onload = () => { db = JSON.parse(reader.result); localStorage.setItem('nasab_simple', JSON.stringify(db)); render(); }
        };
        input.click();
    }
</script>
</body>
</html>
